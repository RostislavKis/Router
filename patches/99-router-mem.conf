# /etc/sysctl.d/99-router-mem.conf
# RAM tuning for GL-MT6000 (1GB RAM, flash/overlay storage, no swap)
# Deployed by setup-cf-optimizer.sh, applied at boot via S11sysctl.

# Flush dirty pages to flash sooner (default 20/10 -> 5/2)
# Reduces risk of data loss on power failure and reduces flash wear
vm.dirty_ratio = 5
vm.dirty_background_ratio = 2

# Release page/inode/dentry cache more aggressively (default 100 -> 200)
# On a router we care more about free RAM than filesystem cache hit rate
vm.vfs_cache_pressure = 200

# Minimum free memory always kept by the kernel (16 MB)
# Prevents kernel from starving itself during allocation spikes from Go runtimes
vm.min_free_kbytes = 16384
