# WARP / AmneziaWG — общие параметры
warp-common: &warp-common
  type: wireguard
  ip: 172.16.0.2
  private-key: YOUR_WARP_PRIVKEY
  public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
  allowed-ips: ['0.0.0.0/0']
  reserved: [240, 220, 224]
  udp: true
  mtu: 1280
  remote-dns-resolve: true
  dns: [1.1.1.1, 1.0.0.1]
  server: 162.159.192.1
  port: 4500

proxies:
  - name: "🔰 WARP-IPv4"
    <<: *warp-common
    icon: https://www.vectorlogo.zone/logos/cloudflare/cloudflare-icon.svg

  - name: "AWG 1.5 (1 Вариант)"
    <<: *warp-common
    amnezia-wg-option:
     jc: 120
     jmin: 23
     jmax: 911
     s1: 0
     s2: 0
     h1: 1
     h2: 2
     h4: 3
     h3: 4
     i1: <b YOUR_AWG_HEX_1>

  - name: "AWG 1.5 (2 Вариант)"
    <<: *warp-common
    amnezia-wg-option:
     jc: 120
     jmin: 23
     jmax: 911
     s1: 0
     s2: 0
     h1: 1
     h2: 2
     h4: 3
     h3: 4
     i1: <b YOUR_AWG_HEX_2>

  - name: "AWG 1.5 (3 Вариант)"
    <<: *warp-common
    amnezia-wg-option:
     jc: 120
     jmin: 23
     jmax: 911
     s1: 0
     s2: 0
     h1: 1
     h2: 2
     h4: 3
     h3: 4
     i1: <b YOUR_AWG_HEX_3_I1>
     i2: <b YOUR_AWG_HEX_3_I2>
     j1: <b YOUR_AWG_HEX_3_J1>
     itime: 120

proxy-providers:
