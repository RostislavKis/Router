# Sniffer для определения сервисов
sniffer:
  enable: true
  sniff-tls-sni: true
  force-dns-mapping: false
  parse-pure-ip: false

  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
      sniff-request: true
    TLS:
      ports: [443, 8443]

  skip-domain:
    - "+.github.com"
    - "+.githubusercontent.com"
    - "+.githubcopilot.com"
    - "+.visualstudio.com"
    - "+.vsassets.io"
    - "+.microsoftonline.com"
    - "+.live.com"
    - "+.office.com"
    - "+.azure.com"
    - "+.windows.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.lan"
    - "+.local"
    - "+.apple.com"
    - "*.miwifi.com"
    - "yandex.ru"
    - "*.yandex.ru"
    - "rutube.ru"
    - "*.rutube.ru"

