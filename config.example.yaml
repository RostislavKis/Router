    type: http
    url: "YOUR_PROVIDER1_URL"
    interval: 3600
    health-check:
      enable: true
      url: "https://cp.cloudflare.com/generate_204"
      interval: 300
    path: ./proxy_providers/provider1.yaml

  Provider2:
    type: http
    url: "YOUR_PROVIDER2_URL"
    interval: 3600
    proxy: "Provider1 Auto"
    health-check:
      enable: true
      url: "https://cp.cloudflare.com/generate_204"
      interval: 300
    path: ./proxy_providers/provider2.yaml

