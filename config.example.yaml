# Прокси-группы
proxy-groups:

  # Gemini AI / NotebookLM — автовыбор по Google-доступности
  - name: "🤖 GEMINI"
    type: select
    use:
      - Provider1
    filter: "^(?!.*(Russia|Россия|Kazakhstan|Казахстан|Armenia|Армения|Torrent|torrent|Истекает|Купить|WARP|AWG)).*$"

  # Provider1 — автовыбор лучшего прокси (без России, Казахстана, WARP/AWG)
  - name: "Provider1 Auto"
    type: url-test
    use:
      - Provider1
    filter: "^(?!.*(Russia|Россия|Kazakhstan|Казахстан|Armenia|Армения|Torrent|torrent|Истекает|Купить|WARP|AWG)).*$"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 120
    tolerance: 50

  # Provider2 — автовыбор лучшего прокси
  - name: "Provider2 Auto"
    type: url-test
    use:
      - Provider2
    filter: "^(?!.*(Armenia|Армения|Истекает|Купить|Torrent|torrent)).*$"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 120
    tolerance: 50

  # Основной прокси — выбор источника или конкретного сервера
  - name: "🎯 MAIN-PROXY"
    type: select
    proxies:
      - "Provider1 Auto"
      - "Provider2 Auto"
    use:
      - Provider1
      - Provider2

  # PROXY — запасная группа для совместимости с правилами
  - name: "PROXY"
    type: select
    use:
      - Provider2
    filter: "^(?!.*(Armenia|Армения|Истекает|Купить|Torrent|torrent)).*$"

  # Telegram — AWG WireGuard
  - name: "✈️ TELEGRAM"
    type: url-test
    proxies:
      - "AWG 1.5 (1 Вариант)"
      - "AWG 1.5 (2 Вариант)"
      - "AWG 1.5 (3 Вариант)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 120

  # Discord — AWG WireGuard
  - name: "🎙️ DISCORD"
    type: url-test
    proxies:
      - "AWG 1.5 (1 Вариант)"
      - "AWG 1.5 (2 Вариант)"
      - "AWG 1.5 (3 Вариант)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 120

  # AWG Group — ручной выбор WireGuard
  - name: "🔰 AWG Group"
    type: select
    proxies:
      - "Provider1 Auto"
      - "AWG 1.5 (1 Вариант)"
      - "AWG 1.5 (2 Вариант)"
      - "AWG 1.5 (3 Вариант)"

